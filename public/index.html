<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GigHunter AI</title>
<style>
  :root { --bg:#0a0e17; --card:#131a2b; --line:#243049; --txt:#e7ecf5; --mut:#8b97b0; --acc:#5b8cff; --ok:#36d399; --warn:#fbbd23; --bad:#f87272; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.55 -apple-system,Segoe UI,Roboto,sans-serif; background:linear-gradient(180deg,#0a0e17,#0c1120); color:var(--txt); min-height:100vh; }
  header { padding:20px 28px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; position:sticky; top:0; background:rgba(10,14,23,.85); backdrop-filter:blur(8px); z-index:5; }
  header h1 { font-size:20px; margin:0; }
  .badge { font-size:12px; color:var(--mut); border:1px solid var(--line); padding:3px 9px; border-radius:999px; }
  .badge.new { color:var(--acc); border-color:var(--acc); }
  main { max-width:1040px; margin:0 auto; padding:24px 28px 60px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  button { background:var(--acc); color:#fff; border:0; padding:10px 16px; border-radius:9px; font-weight:600; cursor:pointer; transition:.15s; }
  button:hover { filter:brightness(1.1); }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--txt); }
  button.sm { padding:5px 10px; font-size:12px; border-radius:7px; }
  .statbar { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:18px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .stat .n { font-size:24px; font-weight:900; }
  .stat .l { font-size:12px; color:var(--mut); text-transform:uppercase; letter-spacing:.04em; margin-top:2px; }
  .stat.win .n { color:var(--ok); }
  .pipeline { display:flex; gap:6px; margin-bottom:18px; height:30px; border-radius:8px; overflow:hidden; border:1px solid var(--line); }
  .pipeline div { display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#0a0e17; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:15px; }
  .card h3 { margin:0 0 6px; font-size:14px; }
  .pill { display:inline-block; font-size:10px; padding:2px 8px; border-radius:999px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
  .pill.public { background:rgba(54,211,153,.15); color:var(--ok); }
  .pill.api { background:rgba(251,189,35,.15); color:var(--warn); }
  .pill.manual { background:rgba(139,151,176,.15); color:var(--mut); }
  .note { color:var(--mut); font-size:12.5px; margin-top:6px; }
  .lead { background:var(--card); border:1px solid var(--line); border-radius:11px; padding:6px 14px; }
  .lead table { width:100%; border-collapse:collapse; font-size:13px; }
  .lead th, .lead td { text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); }
  .lead th { color:var(--mut); font-weight:600; font-size:11px; text-transform:uppercase; }
  .lead tr:last-child td { border-bottom:0; }
  .gig { background:var(--card); border:1px solid var(--line); border-radius:11px; padding:15px; margin-bottom:10px; }
  .gig .score { font-weight:900; font-size:18px; color:var(--acc); }
  .gig.s-applied { opacity:.6; } .gig.s-rejected { opacity:.4; }
  .gig.s-won { border-color:var(--ok); }
  .gig a { color:var(--acc); text-decoration:none; }
  .gig .acts { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
  .secthead { display:flex; align-items:center; justify-content:space-between; margin:24px 0 12px; }
  .secthead h2 { font-size:16px; margin:0; }
  .status { font-size:13px; color:var(--mut); }
  input[type=checkbox] { transform:scale(1.2); margin-right:8px; }
  label.chk { display:flex; align-items:center; cursor:pointer; }
  .empty { color:var(--mut); padding:28px; text-align:center; }
  .tabs { display:flex; gap:6px; }
  .tabs button { background:transparent; border:1px solid var(--line); color:var(--mut); }
  .tabs button.on { background:var(--acc); color:#fff; border-color:var(--acc); }
  .chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { font-size:12px; background:rgba(91,140,255,.12); color:var(--acc); border:1px solid var(--line); padding:3px 10px; border-radius:999px; }
  dialog { background:var(--card); color:var(--txt); border:1px solid var(--line); border-radius:14px; padding:0; max-width:600px; width:92%; }
  dialog .dhead { padding:16px 18px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  dialog .dbody { padding:18px; }
  dialog textarea { width:100%; min-height:220px; background:#0c1120; color:var(--txt); border:1px solid var(--line); border-radius:9px; padding:12px; font:13px/1.5 ui-monospace,monospace; resize:vertical; }
  dialog::backdrop { background:rgba(0,0,0,.6); }
</style>
</head>
<body>
<header>
  <h1>🎯 GigHunter AI</h1>
  <span class="badge" id="llmBadge">llm: …</span>
  <span class="badge new" id="newBadge" style="display:none"></span>
</header>
<main>
  <div class="row">
    <button id="huntBtn">▶ Run hunt now</button>
    <button class="ghost" id="doctorBtn">🩺 Check platforms</button>
    <button class="ghost" id="saveBtn">💾 Save platforms</button>
    <span class="status" id="status"></span>
  </div>

  <div class="statbar" id="statbar"></div>
  <div class="pipeline" id="pipeline"></div>

  <div class="secthead"><h2>Platform leaderboard</h2><span class="status">by wins, then win-rate</span></div>
  <div class="lead" id="leaderboard"><div class="empty">Mark some gigs won/applied to see what's working.</div></div>

  <div class="secthead"><h2>Winning keywords</h2></div>
  <div class="chips" id="keywords"><span class="note">No wins logged yet.</span></div>

  <div class="secthead"><h2>Platforms</h2><span class="status" id="platStatus"></span></div>
  <div class="grid" id="platforms"></div>

  <div class="secthead">
    <h2>Gigs</h2>
    <div class="tabs" id="tabs">
      <button data-f="" class="on">All</button>
      <button data-f="new">New</button>
      <button data-f="applied">Applied</button>
      <button data-f="won">Won</button>
    </div>
  </div>
  <div id="gigs"><div class="empty">No gigs yet. Hit “Run hunt now”.</div></div>
</main>

<dialog id="propDlg">
  <div class="dhead"><strong id="propTitle">Proposal</strong><button class="ghost sm" onclick="document.getElementById('propDlg').close()">✕</button></div>
  <div class="dbody">
    <textarea id="propBody"></textarea>
    <div class="row" style="margin-top:12px">
      <button id="copyBtn">📋 Copy</button>
      <button class="ghost" id="redraftBtn">♻ Re-draft</button>
      <span class="status" id="propStatus"></span>
    </div>
  </div>
</dialog>

<script>
const $ = (id) => document.getElementById(id);
const setStatus = (t) => $('status').textContent = t;
let filter = '';
let currentGigId = null;
const STAGE_COLORS = { new:'#5b8cff', seen:'#8b97b0', applied:'#fbbd23', won:'#36d399', rejected:'#f87272' };

async function loadHealth() {
  const h = await fetch('/health').then(r => r.json());
  $('llmBadge').textContent = `llm: ${h.llm.provider}${h.llm.dryRun ? ' (dry-run)' : ''}`;
}

async function loadStats() {
  const s = await fetch('/api/stats').then(r => r.json());
  $('statbar').innerHTML = [
    { n: s.totals.gigs, l: 'gigs' },
    { n: s.totals.new, l: 'new' },
    { n: s.totals.applied, l: 'applied' },
    { n: s.totals.won, l: 'won' },
    { n: (s.winRate*100).toFixed(0)+'%', l: 'win rate', win:true },
    { n: s.avgScore, l: 'avg score' },
  ].map(x => `<div class="stat ${x.win?'win':''}"><div class="n">${x.n}</div><div class="l">${x.l}</div></div>`).join('');

  const total = s.pipeline.reduce((a,p)=>a+p.count,0) || 1;
  $('pipeline').innerHTML = s.pipeline.filter(p=>p.count).map(p =>
    `<div style="flex:${p.count}; background:${STAGE_COLORS[p.stage]||'#5b8cff'}" title="${p.stage}: ${p.count}">${p.count>=total*0.08?p.stage:''}</div>`
  ).join('') || '<div style="flex:1;background:#243049;color:#8b97b0">no data</div>';

  if (s.platforms.length) {
    $('leaderboard').innerHTML = `<table>
      <tr><th>Platform</th><th>Total</th><th>Applied</th><th>Won</th><th>Win rate</th><th>Avg score</th></tr>
      ${s.platforms.map(p=>`<tr><td>${p.platform}</td><td>${p.total}</td><td>${p.applied}</td><td>${p.won}</td><td>${(p.winRate*100).toFixed(0)}%</td><td>${p.avgScore}</td></tr>`).join('')}
    </table>`;
  }
  if (s.winningKeywords.length) {
    $('keywords').innerHTML = s.winningKeywords.map(k=>`<span class="chip">${k.keyword} · ${k.count}</span>`).join('');
  }
}

async function loadPlatforms() {
  const { platforms, enabled } = await fetch('/api/platforms').then(r => r.json());
  $('platforms').innerHTML = platforms.map(p => `
    <div class="card">
      <h3>${p.name} <span class="pill ${p.mode}">${p.mode}</span></h3>
      <label class="chk">
        <input type="checkbox" data-key="${p.key}" ${enabled.includes(p.key) ? 'checked' : ''} ${p.mode==='manual'?'disabled':''}/>
        ${p.mode==='manual' ? 'drafting-only' : 'enable'}
      </label>
      <div class="note">${p.notes}</div>
    </div>`).join('');
  $('platStatus').textContent = `${enabled.length} enabled`;
}

async function loadGigs() {
  const q = filter ? `?status=${filter}` : '';
  const { gigs, newCount } = await fetch('/gigs' + q).then(r => r.json());
  if (newCount) { $('newBadge').style.display = 'inline-block'; $('newBadge').textContent = `${newCount} new`; }
  else $('newBadge').style.display = 'none';
  if (!gigs.length) { $('gigs').innerHTML = '<div class="empty">Nothing here yet.</div>'; return; }
  $('gigs').innerHTML = gigs.slice(0, 40).map(g => `
    <div class="gig s-${g.status||'new'}">
      <span class="score">${g.score ?? '–'}</span>
      &nbsp; <strong>${g.title}</strong>
      <span class="note">· ${g.source} · ${g.status||'new'}</span>
      <div class="note">${(g.reasons||[]).join(' · ')}</div>
      <div class="acts">
        ${g.url ? `<a href="${g.url}" target="_blank"><button class="ghost sm">open gig ↗</button></a>` : ''}
        <button class="sm" onclick="openProposal('${g.id}')">✍ proposal</button>
        <button class="ghost sm" onclick="setGig('${g.id}','applied')">mark applied</button>
        <button class="ghost sm" onclick="setGig('${g.id}','won')">won</button>
        <button class="ghost sm" onclick="setGig('${g.id}','rejected')">skip</button>
      </div>
    </div>`).join('');
}

async function setGig(id, status) {
  await fetch(`/gigs/${id}/status`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ status }) });
  loadGigs(); loadStats();
}
window.setGig = setGig;

window.openProposal = async (id) => {
  currentGigId = id;
  $('propStatus').textContent = 'loading…';
  $('propDlg').showModal();
  const g = await fetch(`/gigs/${id}`).then(r => r.json());
  $('propTitle').textContent = g.title;
  if (g.proposal) { $('propBody').value = g.proposal.body; $('propStatus').textContent = ''; }
  else { await redraft(); }
};

async function redraft() {
  $('propStatus').textContent = 'drafting…';
  const p = await fetch(`/gigs/${currentGigId}/proposal`, { method:'POST' }).then(r => r.json());
  $('propBody').value = p.body || p.error || '';
  $('propStatus').textContent = 'drafted ✓';
}

$('copyBtn').onclick = async () => { await navigator.clipboard.writeText($('propBody').value); $('propStatus').textContent = 'copied ✓'; };
$('redraftBtn').onclick = redraft;

$('huntBtn').onclick = async () => { setStatus('hunting…'); await fetch('/hunt', { method: 'POST' }); await loadGigs(); await loadStats(); setStatus('hunt complete ✓'); };
$('doctorBtn').onclick = async () => { setStatus('checking…'); const r = await fetch('/api/doctor').then(r=>r.json()); setStatus(r.results.map(x=>`${x.name}:${x.status}`).join('  ·  ')); };
$('saveBtn').onclick = async () => { const keys=[...document.querySelectorAll('input[data-key]:checked')].map(i=>i.dataset.key); await fetch('/api/platforms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({platforms:keys})}); setStatus('platforms saved ✓'); loadPlatforms(); };

$('tabs').addEventListener('click', (e) => { if(e.target.tagName!=='BUTTON')return; filter=e.target.dataset.f; [...$('tabs').children].forEach(b=>b.classList.toggle('on',b===e.target)); loadGigs(); });

loadHealth(); loadStats(); loadPlatforms(); loadGigs();
</script>
</body>
</html>
