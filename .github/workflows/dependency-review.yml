name: Workflow lint

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/dependency-review.yml

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint changed workflow file
        uses: rhysd/actionlint@v1
        with:
          args: .github/workflows/dependency-review.yml
