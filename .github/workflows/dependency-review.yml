name: Workflow lint

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/**

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint workflow files
        uses: rhysd/actionlint@v1
