name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        suite: [adaptive, analytics, budget, dedupe, followups, portfolio, production, proposalVariants, promptSafety, scamFilter, smoke]
    env:
      NODE_ENV: test
      LLM_DRY_RUN: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --ignore-scripts --audit=false
      - run: node --test tests/${{ matrix.suite }}.test.js
      - run: npm run security-check
